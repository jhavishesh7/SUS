<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#2a0845" />
      <stop offset="100%" stop-color="#0f021a" />
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff007f" />
      <stop offset="50%" stop-color="#a020f0" />
      <stop offset="100%" stop-color="#00f0ff" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <stop offset="0%" stop-color="#ff007f" />
      <feGaussianBlur stdDeviation="20" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)" stroke="#ff007f" stroke-width="6" />
  <circle cx="256" cy="256" r="180" fill="none" stroke="#00f0ff" stroke-width="4" stroke-dasharray="10 15" opacity="0.3" />
  <g filter="url(#glow)">
    <text x="50%" y="58%" font-family="Impact, Arial Black, sans-serif" font-size="160" font-weight="900" fill="url(#textGrad)" text-anchor="middle" letter-spacing="5">SUS</text>
  </g>
  <circle cx="390" cy="180" r="12" fill="#ff007f" />
</svg>
